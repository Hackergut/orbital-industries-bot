<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbital — Login</title><link rel="stylesheet" href="/static/orbital.css">
<style>body{display:flex;align-items:center;justify-content:center;min-height:100vh}.oc-nav,.oc-header{display:none}</style>
</head><body><div class="oc-container" style="max-width:380px;width:100%">
<div style="text-align:center;margin-bottom:28px"><div class="oc-dot" style="margin:0 auto 14px;width:14px;height:14px"></div><h1 style="font-size:26px;font-weight:800;letter-spacing:-0.6px">Orbital Command</h1><p style="color:var(--text-secondary);font-size:14px;margin-top:6px">Sign in to continue</p></div>
<div class="oc-card"><div class="oc-card-bd" style="padding:28px">
<form method="post" action="/login">
<label class="oc-label">Username</label><input class="oc-input" type="text" name="username" placeholder="admin" required>
<label class="oc-label">Password</label><input class="oc-input" type="password" name="password" placeholder="••••••••" required>
<button class="oc-btn oc-btn--lg oc-btn--primary" type="submit" style="width:100%;margin-top:20px">Sign In</button>
</form>
{% if error %}<p style="color:var(--danger);font-size:13px;text-align:center;margin-top:14px">{{ error }}</p>{% endif %}
</div></div></div></body></html>
