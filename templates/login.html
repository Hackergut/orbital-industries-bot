<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbital Industries — Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #e5e7eb; display:flex; align-items:center; justify-content:center; height:100vh; }
    .card { background:#111827; padding:24px; border-radius:10px; width:360px; box-shadow:0 0 0 1px #1f2937; }
    input { width:100%; padding:10px; margin:8px 0; border-radius:6px; border:1px solid #374151; background:#0f172a; color:#e5e7eb; }
    button { width:100%; padding:10px; background:#ef4444; border:none; border-radius:6px; color:white; font-weight:600; }
    .error { color:#fca5a5; margin-top:8px; }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h2>Orbital Industries</h2>
    <input name="username" placeholder="Username" />
    <input name="password" type="password" placeholder="Password" />
    <button type="submit">Login</button>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </form>
</body>
</html>
