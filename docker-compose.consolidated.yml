services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.consolidated
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/instance/orbital.db
      - FIRECRAWL_API_KEY=fc-2c1b2acba3dc4c3f80a2dd91c679a471
      - BROWSER_POOL_SIZE=2
      - BROWSER_HEADLESS=true
      - DISABLE_LLM_FORMS=true
      - AI_PROVIDER=ollama
      - AI_MODEL=llama3.1:8b
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_TIMEOUT=15
      - CHROME_BIN=/usr/bin/chromium
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
      - PYTHONUNBUFFERED=1
      - SELENIUM_POOL_SIZE=2
      - SELENIUM_RETRY_ATTEMPTS=3
      - SELENIUM_RETRY_DELAY=1.0
      - SELENIUM_PAGE_LOAD_TIMEOUT=45
      - SELENIUM_SCRIPT_TIMEOUT=45
      - SELENIUM_HEALTH_CHECK_INTERVAL=60
      - SELENIUM_HEADLESS=true
      - TEMPORAL_HOST=temporal:7233
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./static:/app/static
      - ./logs:/app/logs
      - ./browser_data:/app/browser_data
      - ./instance:/app/instance
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/temporal/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:
  temporal_data:
