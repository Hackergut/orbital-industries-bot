# ── Orbital Industries — Nginx Reverse Proxy ─────────────────

upstream orbital_web {
    server web:5000;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=orbital:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name _;  # Catch-all

    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files served directly by nginx (faster)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check endpoint (no rate limit)
    location /api/pipeline/status {
        proxy_pass http://orbital_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main app with rate limiting
    location / {
        limit_req zone=orbital burst=20 nodelay;
        limit_conn addr 10;

        proxy_pass http://orbital_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future live updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block common attack paths
    location ~ /(\.env|\.git|\.htaccess|\.htpasswd|config\.py|requirements\.txt) {
        deny all;
        return 404;
    }
}
