version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/instance/orbital.db
      - FIRECRAWL_API_KEY=fc-2c1b2acba3dc4c3f80a2dd91c679a471
      - UVICORN_WORKERS=1
      - BROWSER_POOL_SIZE=1
      - BROWSER_HEADLESS=true
      - DISABLE_LLM_FORMS=false
      - AI_PROVIDER=ollama
      - AI_MODEL=llama3:latest
      - OLLAMA_HOST=http://host.docker.internal:11434
    depends_on:
      - redis
    volumes:
      - ./static:/app/static
      - ./logs:/app/logs
      - ./browser_data:/app/browser_data
      - db_data:/app/instance
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "run.py"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/instance/orbital.db
      - FIRECRAWL_API_KEY=fc-2c1b2acba3dc4c3f80a2dd91c679a471
      - BROWSER_POOL_SIZE=3
      - BROWSER_HEADLESS=false
      - DISPLAY=:99
      - PIPELINE_MAX_CONCURRENT=3
      - PIPELINE_BATCH_SIZE=15
      - PIPELINE_TARGET_DAILY=500
      - DISABLE_LLM_FORMS=false
      - AI_PROVIDER=ollama
      - AI_MODEL=llama3:latest
      - OLLAMA_HOST=http://host.docker.internal:11434
      - PIPELINE_INTERVAL=60
      - KEEP_OPEN_SECONDS=20
    depends_on:
      - redis
      - web
    volumes:
      - ./static:/app/static
      - ./logs:/app/logs
      - ./browser_data:/app/browser_data
      - db_data:/app/instance
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["./worker_start.sh"]

volumes:
  redis_data:
  db_data:
