# =============================================================================
# Orbital Tech 2 - Docker Compose (Local Mac Development)
# =============================================================================
# REQUIREMENTS:
#   1. Start Temporal dev server FIRST on the host (required):
#        temporal server start-dev
#      (UI will be at http://localhost:8233)
#
#   2. Then run:
#        docker compose up -d --build
#
# NOTES:
#   - All services use host.docker.internal to reach Temporal + Ollama on Mac host.
#   - Legacy 'worker' (threaded pipeline) is DISABLED by default.
#   - SQLite is shared across containers — avoid heavy concurrent writes.
# =============================================================================

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/instance/orbital.db
      - UVICORN_WORKERS=1
      - BROWSER_POOL_SIZE=2
      - BROWSER_HEADLESS=true
      - DISABLE_LLM_FORMS=true
      - AI_PROVIDER=ollama
      - AI_MODEL=llama3.1:8b
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_HOST_2=${OLLAMA_HOST_2:-}
      - OLLAMA_API_KEY_2=${OLLAMA_API_KEY_2:-}
      - OLLAMA_TIMEOUT=15
      - CHROME_BIN=/usr/bin/chromium
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
      - PYTHONUNBUFFERED=1
      - SELENIUM_POOL_SIZE=2
      - SELENIUM_RETRY_ATTEMPTS=3
      - TEMPORAL_HOST=host.docker.internal:7233
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./static:/app/static
      - ./logs:/app/logs
      - ./browser_data:/app/browser_data
      - ./instance:/app/instance
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/temporal/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["python", "run.py"]

