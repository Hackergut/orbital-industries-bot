  # ── Crawl4AI self-hosted scraper ───────────────────────────────────────────
  crawl4ai:
    image: unclecode/crawl4ai:latest
    restart: unless-stopped
    ports:
      - "11235:11235"
    environment:
      - CRAWL4AI_API_KEY=orbital-local-key
      - MAX_CONCURRENT_CRAWLS=3
      - CRAWL_TIMEOUT=45
    volumes:
      - crawl4ai_data:/app/crawl4ai/.crawl4ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  redis_data:
  crawl4ai_data:

