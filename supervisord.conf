[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:web]
command=python run.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/app/logs/web_error.log
stdout_logfile=/app/logs/web.log
environment=PORT="5000",HOST="0.0.0.0"

[program:worker]
command=bash -c "sleep 5 && ./worker_start.sh"
directory=/app
autostart=true
autorestart=true
stderr_logfile=/app/logs/worker_error.log
stdout_logfile=/app/logs/worker.log
priority=999

[group:orbital]
programs=web,worker
priority=999
